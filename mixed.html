<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Προσομοίωση Εξέτασης Γεωπληροφορική</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f766e, #14532d);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 42px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 18px;
      color: #d1fae5;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: #dcfce7;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #ffffff;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .quiz-card {
      background: #ffffff;
      color: #14532d;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .question {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.45;
      margin-bottom: 25px;
    }

    .answers {
      display: grid;
      gap: 15px;
      margin-bottom: 22px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      background: #e5e7eb;
      color: #1f2937;
      padding: 16px 18px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border 0.2s ease;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      background: #d1d5db;
      border-color: #9ca3af;
    }

    .answer-btn.correct {
      background: #dcfce7;
      color: #14532d;
      border-color: #16a34a;
    }

    .answer-btn.wrong {
      background: #fee2e2;
      color: #7f1d1d;
      border-color: #dc2626;
    }

    .feedback {
      display: none;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 24px;
      line-height: 1.55;
      font-size: 16px;
    }

    .feedback.correct-box {
      display: block;
      background: #dcfce7;
      color: #14532d;
      border: 2px solid #16a34a;
    }

    .feedback.wrong-box {
      display: block;
      background: #fee2e2;
      color: #7f1d1d;
      border: 2px solid #dc2626;
    }

    .feedback strong {
      display: block;
      margin-bottom: 7px;
      font-size: 18px;
    }

    .next-btn,
    .restart-btn {
      border: none;
      border-radius: 16px;
      background: #14532d;
      color: #ffffff;
      padding: 15px 28px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .next-btn:hover,
    .restart-btn:hover {
      transform: translateY(-4px);
      background: #0f766e;
    }

    .score-screen {
      text-align: center;
      display: none;
    }

    .score-screen h2 {
      font-size: 40px;
      margin-bottom: 15px;
      color: #14532d;
    }

    .score-screen p {
      font-size: 20px;
      margin-bottom: 30px;
      color: #374151;
    }
  </style>
</head>
<body>

  <main class="container">
    <header>
      <h1>Mixed Quiz</h1>
      <p>20 τυχαίες ερωτήσεις από όλες τις ενότητες</p>
    </header>

    <div class="progress-info">
      <span id="questionCounter">Ερώτηση 1 / 20</span>
      <span id="scoreCounter">Score: 0</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <section class="quiz-card" id="quizCard">
      <div class="question" id="question"></div>

      <div class="answers" id="answers"></div>

      <div class="feedback" id="feedback"></div>

      <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>
        Επόμενη Ερώτηση
      </button>
    </section>

    <section class="quiz-card score-screen" id="scoreScreen">
      <h2>Quiz Complete!</h2>
      <p id="finalScore"></p>

      <button class="restart-btn" onclick="restartQuiz()">
        Restart Quiz
      </button>
    </section>
  </main>

  <script>

 

    async function loadAllQuestions() {

      const files = [
        "enothta1.html",
        "enothta2.html",
        "enothta3.html",
        "enothta4.html",
        "enothta5.html",
        "enothta6.html"
      ];

      let combinedQuestions = [];

      for (const file of files) {
        const response = await fetch(file);
        const text = await response.text();

        const match = text.match(/const questions = \[(.*?)\];/s);

        if (match) {
          const parsed = eval("[" + match[1] + "]");
          combinedQuestions.push(...parsed);
        }
      }

      shuffleArray(combinedQuestions);

      return combinedQuestions.slice(0, 20);
    }

    let questions = [];

    loadAllQuestions().then(result => {
      questions = result;
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    shuffleArray(allQuestions);

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const progressFill = document.getElementById("progressFill");
    const questionCounter = document.getElementById("questionCounter");
    const scoreCounter = document.getElementById("scoreCounter");

    function loadQuestion() {
      resetState();

      const q = questions[currentQuestion];

      questionEl.textContent = q.question;

      questionCounter.textContent = `Ερώτηση ${currentQuestion + 1} / ${questions.length}`;

      progressFill.style.width = `${((currentQuestion) / questions.length) * 100}%`;

      q.answers.forEach((answer, index) => {
        const button = document.createElement("button");

        button.textContent = answer;
        button.classList.add("answer-btn");

        button.addEventListener("click", () => selectAnswer(index, button));

        answersEl.appendChild(button);
      });
    }

    function resetState() {
      nextBtn.disabled = true;
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "";

      while (answersEl.firstChild) {
        answersEl.removeChild(answersEl.firstChild);
      }
    }

    function selectAnswer(index, button) {
      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);

      if (index === q.correct) {
        button.classList.add("correct");
        score++;
        scoreCounter.textContent = `Score: ${score}`;

        feedbackEl.classList.add("correct-box");
        feedbackEl.innerHTML = `
          <strong>Σωστό!</strong>
          ${q.explanation}
        `;
      } else {
        button.classList.add("wrong");

        buttons[q.correct].classList.add("correct");

        feedbackEl.classList.add("wrong-box");
        feedbackEl.innerHTML = `
          <strong>Λάθος!</strong>
          Η σωστή απάντηση είναι: <b>${q.answers[q.correct]}</b><br><br>
          ${q.explanation}
        `;
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestion++;

      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showScore();
      }
    }

    function showScore() {
      document.getElementById("quizCard").style.display = "none";
      document.getElementById("scoreScreen").style.display = "block";

      progressFill.style.width = "100%";

      document.getElementById("finalScore").textContent =
        `Πέτυχες ${score} από ${questions.length} σωστές απαντήσεις!`;
    }

    function restartQuiz() {
      location.reload();
    }

    loadQuestion();

  </script>
</body>
</html>
